services:
  server:
    image: softvence/carmasearch-server:latest
    container_name: carma-server
    platform: linux/amd64
    profiles:
      - prod
      - server
    environment:
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - SERVER_READ_TIMEOUT=15s
      - SERVER_WRITE_TIMEOUT=15s
      - SERVER_IDLE_TIMEOUT=60s
      - ENV=production
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_USER=carma_user
      - DB_PASSWORD=carma0912pass
      - DB_NAME=carma_db
      - DB_SSLMODE=disable
      - DB_MAX_OPEN_CONNS=25
      - DB_MAX_IDLE_CONNS=5
      - DB_CONN_MAX_LIFETIME=5m
      - ES_ADDRESSES=http://localhost:9200
      - ES_USERNAME=elastic
      - ES_PASSWORD=elastic
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - CORS_ALLOWED_HEADERS=Accept,Authorization,Content-Type,X-Request-ID
      - CORS_ALLOWED_METHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
    build:
      context: ../../apps/intelligence
      dockerfile: Dockerfile.intelligence
    ports:
      - "8080:8080"
    networks:
      - carmasearch

  scraper:
    image: softvence/carmasearch-scraper:latest
    platform: linux/amd64
    container_name: carma-scraper
    profiles:
      - prod
      - scraper
    environment:
      - ENV=production
    build:
      context: ../../apps/scraper
      dockerfile: Dockerfile.scraper
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - 8000:8000
    networks:
      - carmasearch

  web:
    container_name: carma-web
    image: softvence/carmasearch-web:latest
    platform: linux/amd64
    profiles:
      - prod
      - web
    build:
      context: ../../apps/web
      dockerfile: Dockerfile.web
    environment:
      - ENV=production
      - SERVER_HOST=http://localhost:8080
    ports:
      - "3000:3000"
    networks:
      - carmasearch

  db:
    image: postgres:16-alpine
    container_name: carma_db
    profiles:
      - dev
      - prod
      - db
    environment:
      POSTGRES_USER: ${DB_USER:-carma_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-carma0912pass}
      POSTGRES_DB: ${DB_NAME:-carma_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-carma_user} -d ${DB_NAME:-carma_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carmasearch
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis
    profiles:
      - dev
      - prod
      - redis
    networks:
      - carmasearch
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.5.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
    profiles:
      - dev
      - prod
      - elasticsearch
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
    networks:
      - carmasearch
    restart: unless-stopped

networks:
  carmasearch:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  elasticsearch:
    driver: local
